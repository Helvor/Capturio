services:
  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file: .env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ${PHOTOS_HOST_DIR:-./photos}:/photos
      - ./cache:/app/cache
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
