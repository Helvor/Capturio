<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Capturio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css?v={{ asset_v }}" />
</head>
<body class="login-body">
  <div class="login-container">
    <h1 class="login-title">Capturio</h1>
    <p class="login-sub">Admin access</p>

    {% if error %}
    <p class="login-error">{{ error }}</p>
    {% endif %}

    <form action="/auth/login" method="post" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-primary full-width">Sign in</button>
    </form>
  </div>
</body>
</html>
