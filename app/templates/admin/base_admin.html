<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Admin — Capturio{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
  {% block head %}{% endblock %}
</head>
<body class="admin-body">

  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <a href="/admin" class="sidebar-logo">Capturio</a>
      <span class="sidebar-label">Admin</span>
    </div>

    <nav class="sidebar-nav">
      <a href="/admin" class="sidebar-link {% if request.url.path == '/admin' %}active{% endif %}">
        <span class="sidebar-icon">&#9632;</span> Dashboard
      </a>
      <a href="/admin/folders" class="sidebar-link {% if '/admin/folders' in request.url.path or '/admin/import' in request.url.path %}active{% endif %}">
        <span class="sidebar-icon">&#128193;</span> Import
      </a>
      <a href="/admin/photos" class="sidebar-link {% if request.url.path.startswith('/admin/photos') %}active{% endif %}">
        <span class="sidebar-icon">&#9724;</span> Photos
      </a>
      <a href="/admin/albums" class="sidebar-link {% if request.url.path.startswith('/admin/albums') %}active{% endif %}">
        <span class="sidebar-icon">&#9723;</span> Albums
      </a>
      <a href="/admin/spaces" class="sidebar-link {% if request.url.path.startswith('/admin/spaces') %}active{% endif %}">
        <span class="sidebar-icon">&#9638;</span> Spaces
      </a>
      <a href="/admin/posts" class="sidebar-link {% if request.url.path.startswith('/admin/posts') %}active{% endif %}">
        <span class="sidebar-icon">&#9648;</span> Posts
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="/" target="_blank" class="sidebar-link sidebar-link-muted">
        <span class="sidebar-icon">&#8599;</span> View site
      </a>
      <form action="/auth/logout" method="post">
        <button type="submit" class="sidebar-link sidebar-link-muted sidebar-logout">
          <span class="sidebar-icon">&#8592;</span> Logout
        </button>
      </form>
    </div>
  </aside>

  <main class="admin-main">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/main.js" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
